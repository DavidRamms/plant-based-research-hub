<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant-Based Research Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; color: #555; max-width: 500px; margin: 0.5rem auto; line-height: 1.6; }
    .badge { display: inline-block; background: #0f3460; color: white; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.9rem; margin-top: 1.5rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #0f3460; border-radius: 50%; animation: spin 1s linear infinite; margin: 1.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">🌱</div>
  <h1>Plant-Based Research Hub</h1>
  <p>Gathering and summarising peer-reviewed research on plant-based and vegan diets from PubMed.</p>
  <p>The first data fetch is running now — the full site will be ready shortly. Refresh this page in a few minutes.</p>
  <div class="spinner"></div>
  <span class="badge">First run in progress...</span>
</body>
</html>
